<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abhinav Gupta — building agents that do real work">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#16161e"/>
      <stop offset="50%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>

    <linearGradient id="accentShift" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bb9af7">
        <animate attributeName="stop-color" values="#bb9af7;#7aa2f7;#7dcfff;#bb9af7" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7dcfff">
        <animate attributeName="stop-color" values="#7dcfff;#bb9af7;#7aa2f7;#7dcfff" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="shimmer" x1="-1" y1="0" x2="0" y2="0">
      <stop offset="0%"  stop-color="#c0caf5"/>
      <stop offset="45%" stop-color="#c0caf5"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#c0caf5"/>
      <stop offset="100%" stop-color="#c0caf5"/>
      <animate attributeName="x1" values="-1;1.5" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2.5" dur="7s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#414868" opacity="0.32"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Twinkling constellation stars -->
  <g fill="#7aa2f7">
    <circle cx="120" cy="80"  r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="50"  r="0.9"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="5.0s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="400" r="1.4"><animate attributeName="opacity" values="0.2;1.0;0.2" dur="6.0s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="420" r="1.0"><animate attributeName="opacity" values="0.4;1.0;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="60"  r="1.5"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="55"  cy="280" r="0.8"><animate attributeName="opacity" values="0.4;0.7;0.4" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="380" r="1.2"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="240" r="0.9"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="6.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Background glows behind orbital -->
  <ellipse cx="950" cy="230" rx="360" ry="240" fill="url(#glowA)"/>
  <ellipse cx="950" cy="230" rx="200" ry="150" fill="url(#glowB)"/>

  <!-- Floating particles drifting across -->
  <g fill="#7dcfff">
    <circle r="1.5" cy="220">
      <animate attributeName="cx" values="-20;1220" dur="35s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="220;180;240;220" dur="35s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.9;1" dur="35s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" cy="80">
      <animate attributeName="cx" values="-20;1220" dur="48s" begin="-15s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;120;90;80" dur="48s" begin="-15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.9;1" dur="48s" begin="-15s" repeatCount="indefinite"/>
    </circle>
    <circle r="1" cy="400">
      <animate attributeName="cx" values="-20;1220" dur="28s" begin="-8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.9;1" dur="28s" begin="-8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Pulsing "online" status, top-right -->
  <g transform="translate(1080 35)" font-family="ui-monospace, monospace" font-size="11" fill="#9ece6a">
    <circle cx="0" cy="-3" r="3.5" fill="#9ece6a">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3.5;4.5;3.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-3" r="7" fill="none" stroke="#9ece6a" opacity="0.4">
      <animate attributeName="r" values="3.5;12;3.5" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <text x="14" fill="#9ece6a">shipping · 2026</text>
  </g>

  <!-- Orbital agent constellation -->
  <g transform="translate(960 230)">
    <!-- Orbit rings -->
    <g opacity="0.45" fill="none" stroke-dasharray="2 4">
      <circle r="155" stroke="#7aa2f7" stroke-width="0.5"/>
      <circle r="110" stroke="#bb9af7" stroke-width="0.5"/>
      <circle r="70"  stroke="#7dcfff" stroke-width="0.5"/>
    </g>

    <!-- Center node + concentric pulse halos -->
    <circle r="13" fill="#bb9af7">
      <animate attributeName="r" values="13;16;13" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="22" fill="none" stroke="#bb9af7" stroke-width="1">
      <animate attributeName="r" values="14;40;14" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="32" fill="none" stroke="#bb9af7" stroke-width="0.5">
      <animate attributeName="r" values="14;58;14" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner orbit -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="70" y2="0" stroke="#7dcfff" stroke-width="1" opacity="0.4"/>
      <circle cx="70" cy="0" r="6" fill="#7dcfff">
        <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Middle orbit (2 nodes opposite) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="22s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="110" y2="0" stroke="#7aa2f7" stroke-width="1" opacity="0.4"/>
      <circle cx="110" cy="0" r="7" fill="#7aa2f7">
        <animate attributeName="r" values="7;9;7" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="300" to="660" dur="22s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="110" y2="0" stroke="#7aa2f7" stroke-width="0.5" opacity="0.25"/>
      <circle cx="110" cy="0" r="4" fill="#7aa2f7" opacity="0.85">
        <animate attributeName="r" values="4;5.5;4" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Outer orbit (2 nodes) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="240" to="600" dur="32s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="155" y2="0" stroke="#bb9af7" stroke-width="1" opacity="0.4"/>
      <circle cx="155" cy="0" r="5" fill="#bb9af7">
        <animate attributeName="r" values="5;7;5" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="60" to="420" dur="32s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="155" y2="0" stroke="#bb9af7" stroke-width="0.5" opacity="0.25"/>
      <circle cx="155" cy="0" r="3" fill="#c0caf5"/>
    </g>

    <!-- Counter-orbit small inner -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite"/>
      <circle cx="45" cy="0" r="2.5" fill="#c0caf5" opacity="0.85"/>
    </g>
  </g>

  <!-- Name with subtle shimmer -->
  <text x="80" y="225" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="100" font-weight="700" fill="url(#shimmer)" letter-spacing="-2.5">
    Abhinav Gupta
  </text>

  <!-- Animated, color-shifting accent underline -->
  <line x1="80" y1="252" x2="80" y2="252" stroke="url(#accentShift)" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" from="80" to="600" dur="1.6s" begin="0.3s" fill="freeze"/>
  </line>

  <!-- Cycling subtitle -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="24">
    <text x="80" y="305" fill="#7dcfff">
      <tspan opacity="0">building agents that do real work
        <animate attributeName="opacity" values="0;1;1;0;0;0;0" keyTimes="0;0.05;0.28;0.33;0.66;0.95;1" dur="12s" repeatCount="indefinite"/>
      </tspan>
    </text>
    <text x="80" y="305" fill="#bb9af7">
      <tspan opacity="0">deterministic. verifiable. shipped.
        <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.33;0.38;0.42;0.61;0.66;1" dur="12s" repeatCount="indefinite"/>
      </tspan>
    </text>
    <text x="80" y="305" fill="#7aa2f7">
      <tspan opacity="0">MCP servers · research autopilots · pipelines
        <animate attributeName="opacity" values="0;0;0;0;0;1;1;0" keyTimes="0;0.6;0.65;0.66;0.7;0.74;0.95;1" dur="12s" repeatCount="indefinite"/>
      </tspan>
    </text>
  </g>

  <!-- Terminal section (multi-line) -->
  <g transform="translate(80 370)" font-family="ui-monospace, monospace" font-size="15">
    <text fill="#565f89">~ </text>
    <text x="22" fill="#9ece6a">$ </text>
    <text x="40" fill="#a9b1d6">whoami</text>
    <text x="40" y="22" fill="#565f89" font-size="13">→ ai agent engineer · ships verifiable systems · india</text>
    <text x="0"  y="48" fill="#565f89">~ </text>
    <text x="22" y="48" fill="#9ece6a">$ </text>
    <text x="40" y="48" fill="#a9b1d6">status</text>
    <rect x="105" y="36" width="9" height="15" fill="#7dcfff">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
