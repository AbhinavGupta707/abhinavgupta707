<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abhinav Gupta — building agents that do real work">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bb9af7"/>
      <stop offset="50%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#414868" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <ellipse cx="950" cy="180" rx="320" ry="210" fill="url(#glow)"/>

  <!-- Agent graph: rotating orbital nodes -->
  <g transform="translate(960 180)">
    <g opacity="0.55">
      <circle r="115" fill="none" stroke="#7aa2f7" stroke-width="0.5" stroke-dasharray="2 4"/>
      <circle r="75"  fill="none" stroke="#bb9af7" stroke-width="0.5" stroke-dasharray="2 4"/>
    </g>

    <!-- center node -->
    <circle r="10" fill="#bb9af7">
      <animate attributeName="r" values="10;13;10" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.7;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="22" fill="none" stroke="#bb9af7" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="14;30;14" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>

    <!-- orbit 1 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="115" y2="0" stroke="#7dcfff" stroke-width="1" opacity="0.35"/>
      <circle cx="115" cy="0" r="6" fill="#7dcfff">
        <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- orbit 2 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="22s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="75" y2="0" stroke="#7aa2f7" stroke-width="1" opacity="0.35"/>
      <circle cx="75" cy="0" r="7" fill="#7aa2f7">
        <animate attributeName="r" values="7;9;7" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- orbit 3 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="240" to="600" dur="22s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="115" y2="0" stroke="#bb9af7" stroke-width="1" opacity="0.35"/>
      <circle cx="115" cy="0" r="5" fill="#bb9af7">
        <animate attributeName="r" values="5;7;5" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- counter-orbit small -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="14s" repeatCount="indefinite"/>
      <circle cx="50" cy="0" r="2.5" fill="#c0caf5" opacity="0.8"/>
    </g>
  </g>

  <!-- Name -->
  <text x="80" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="84" font-weight="700" fill="#c0caf5" letter-spacing="-2">
    Abhinav Gupta
  </text>

  <!-- Animated accent underline (draws on load) -->
  <line x1="80" y1="196" x2="80" y2="196" stroke="url(#accent)" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" from="80" to="500" dur="1.4s" begin="0.3s" fill="freeze"/>
  </line>

  <!-- Cycling subtitle (3 messages over 12s) -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="22">
    <text x="80" y="245" fill="#7dcfff">
      <tspan opacity="0">building agents that do real work
        <animate attributeName="opacity" values="0;1;1;0;0;0;0" keyTimes="0;0.05;0.28;0.33;0.66;0.95;1" dur="12s" repeatCount="indefinite"/>
      </tspan>
    </text>
    <text x="80" y="245" fill="#bb9af7">
      <tspan opacity="0">deterministic. verifiable. shipped.
        <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.33;0.38;0.42;0.61;0.66;1" dur="12s" repeatCount="indefinite"/>
      </tspan>
    </text>
    <text x="80" y="245" fill="#7aa2f7">
      <tspan opacity="0">MCP servers · research autopilots · pipelines
        <animate attributeName="opacity" values="0;0;0;0;0;1;1;0" keyTimes="0;0.6;0.65;0.66;0.7;0.74;0.95;1" dur="12s" repeatCount="indefinite"/>
      </tspan>
    </text>
  </g>

  <!-- bottom prompt cursor -->
  <g transform="translate(80 300)" font-family="ui-monospace, monospace" font-size="15" fill="#565f89">
    <text>~ </text>
    <text x="20" fill="#9ece6a">$ </text>
    <text x="36" fill="#a9b1d6">whoami</text>
    <rect x="98" y="-12" width="8" height="14" fill="#7dcfff">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
