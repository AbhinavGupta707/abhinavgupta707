<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Activity overview: 98% commits, 0% code review, 0% issues, 2% pull requests">
  <defs>
    <linearGradient id="armGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#1a1b26" rx="10"/>

  <!-- gridlines (faint cross showing scale) -->
  <line x1="90" y1="160" x2="390" y2="160" stroke="#414868" stroke-width="1"/>
  <line x1="240" y1="55" x2="240" y2="265" stroke="#414868" stroke-width="1"/>

  <!-- ticks at 50% along each arm -->
  <circle cx="165" cy="160" r="1.5" fill="#414868"/>
  <circle cx="315" cy="160" r="1.5" fill="#414868"/>
  <circle cx="240" cy="108" r="1.5" fill="#414868"/>
  <circle cx="240" cy="212" r="1.5" fill="#414868"/>

  <!-- data arms (from center to each percentage point) -->
  <line x1="240" y1="160" x2="93" y2="160" stroke="url(#armGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="160" x2="240"  y2="160" stroke="url(#armGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="160" x2="240" y2="160"  stroke="url(#armGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="160" x2="240" y2="162"     stroke="url(#armGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- data points -->
  <circle cx="93" cy="160" r="5.5" fill="#bb9af7"/>
  <circle cx="240"  cy="160" r="5.5" fill="#bb9af7"/>
  <circle cx="240" cy="160"  r="5.5" fill="#bb9af7"/>
  <circle cx="240" cy="162"     r="5.5" fill="#bb9af7"/>

  <!-- center dot -->
  <circle cx="240" cy="160" r="3.5" fill="#c0caf5"/>

  <!-- Labels (axis name + percentage) -->
  <!-- top: Code review -->
  <text x="240" y="35" text-anchor="middle" fill="#c0caf5" font-family="-apple-system, ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="14" font-weight="500">Code review</text>
  <text x="240" y="19" text-anchor="middle" fill="#7aa2f7" font-family="-apple-system, ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600">0%</text>

  <!-- right: Issues -->
  <text x="405" y="165" text-anchor="start" fill="#c0caf5" font-family="-apple-system, ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="14" font-weight="500">Issues</text>
  <text x="405" y="148" text-anchor="start" fill="#7aa2f7" font-family="-apple-system, ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600">0%</text>

  <!-- bottom: Pull requests -->
  <text x="240" y="290" text-anchor="middle" fill="#c0caf5" font-family="-apple-system, ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="14" font-weight="500">Pull requests</text>
  <text x="240" y="307" text-anchor="middle" fill="#7aa2f7" font-family="-apple-system, ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600">2%</text>

  <!-- left: Commits -->
  <text x="75" y="165" text-anchor="end" fill="#c0caf5" font-family="-apple-system, ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="14" font-weight="500">Commits</text>
  <text x="75" y="148" text-anchor="end" fill="#7aa2f7" font-family="-apple-system, ui-sans-serif, system-ui, Segoe UI, sans-serif" font-size="13" font-weight="600">98%</text>
</svg>
