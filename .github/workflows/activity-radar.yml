name: Activity radar
on:
  schedule:
    - cron: "0 6 * * *"   # daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate radar SVG
        env:
          USERNAME: AbhinavGupta707
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT: assets/activity-radar.svg
        run: python .github/scripts/activity-radar.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity-radar.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate activity radar"
            git push
          fi
