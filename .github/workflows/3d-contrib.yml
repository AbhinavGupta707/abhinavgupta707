name: 3D contribution skyline
on:
  schedule:
    - cron: "10 18 * * *"   # daily, after most days' commits land
  workflow_dispatch:
  # NOTE: deliberately no push trigger — this workflow commits a generated SVG
  # back to main, which would loop with the metrics workflow.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D isometric contribution graph
        uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: abhinavgupta707
          # Settings live in ./sample-settings/ in the action repo — these are good presets:
          SETTING_JSON: sample-settings/profile-night-rainbow.json

      - name: Commit generated SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate 3D contribution graph"
            git push
          fi
