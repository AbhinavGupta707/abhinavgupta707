name: Metrics
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  # NOTE: deliberately no push trigger — this workflow commits metrics.svg back
  # to main, which would cause an infinite loop with the 3d-contrib workflow.

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ─── Main activity card (matches the screenshot you sent: heatmap + radar) ───
      - name: Activity overview (heatmap + radar)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: abhinavgupta707
          filename: metrics.svg
          template: classic
          base: "header, activity, community, repositories, metadata"
          config_timezone: Asia/Kolkata
          config_padding: 0, 8 + 6%
          # The radar chart in your screenshot:
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: all
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_followup: yes

      # ─── Achievements ribbon (subtle, not the trophy meme) ───
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: abhinavgupta707
          filename: metrics.plugin.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
